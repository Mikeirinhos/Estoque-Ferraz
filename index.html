<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estoque</title>

  <style>

    li {
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-word;
}

    select {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}
    
    .lista-container {
  background: #999595;
  margin: 15px;
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: #f2f2f2;
    color: #333;
  }

  h2 {
    text-align: center;
    padding: 15px;
    background: #ffffff;
    margin: 0;
    font-size: 20px;
    border-bottom: 1px solid #ddd;
  }

  .filtros {
    background: #ffffff;
    padding: 15px;
    margin: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }

  select {
  width: 100%;
  padding: 16px; /* aumentamos */
  margin-bottom: 12px;
  font-size: 18px; /* maior */
  border-radius: 10px;
  border: 1px solid #ccc;
  background: #e6e6e6;
  color: #333;
  cursor: pointer;
  transition: background 0.2s ease, border 0.2s ease;
}

select:hover {
  background: #dcdcdc;
  border-color: #c2c0c0;
}

select:focus,
select:active {
  background: #e6e6e6; /* volta ao normal */
  border-color: #ccc;
  outline: none;
}
  ul {
    padding: 10px;
  }

  li {
  background: transparent;
  padding: 10px 0;
  margin: 0;
  list-style: none;
  font-size: 16px;
  border-bottom: none;
}

  li:hover {
    background: #525252;
  }

  p {
    color: #666;
    font-size: 15px;
  }
</style>
</head>
<body>
  
  <h2 id="tituloRua"></h2>

  <div class="bloco-filtros">

  <h3 class="titulo-bloco">FILTROS</h3>

  <select id="filtroAndar">
    <option value="">Andares</option>
    <option value="T">Térreo</option>
    <option value="1">1º andar</option>
    <option value="2">2º andar</option>
  </select>

  <select id="filtroColuna">
    <option value="">Colunas</option>
  </select>

</div>

<div class="lista-container">
  <ul id="lista"></ul>
</div>

<script>

const filtroColuna = document.getElementById("filtroColuna");

for (let i = 1; i <= 15; i++) {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = `Coluna ${i}`;
  filtroColuna.appendChild(option);
}

let dados = [];

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vS_k6TpswY-mTiwtpRITtbOmHgegazdroKBaKCwGUj62W01RqRfFNueAFdYE90wYzxndAQ6JCO8eGFn/pub?gid=288876170&single=true&output=csv")
  .then(res => res.text())
  .then(csv => {
    const linhas = csv.split("\n");
    const cabecalho = linhas[0].split(",");

    dados = linhas.slice(1).map(linha => {
      const valores = linha.split(",");
      let obj = {};

      cabecalho.forEach((coluna, i) => {
        obj[coluna.trim()] = valores[i]?.trim();
      });

      return obj;
    });

    console.log(dados[0]);

    // 👉 AQUI você chama sua função principal
    renderizar(dados);
  });

// pega parâmetros da URL
const params = new URLSearchParams(window.location.search);
const rua = params.get("rua");
const andar = params.get("andar");

const tituloRua = document.getElementById("tituloRua");

if (rua) {
  tituloRua.textContent = `RUA ${rua}`;
}

const lista = document.getElementById("lista");
const filtroAndar = document.getElementById("filtroAndar");

function renderizar(dados) {
  lista.innerHTML = "";

  if (!filtroAndar.value && !filtroColuna.value) {
  lista.innerHTML = "<p style='text-align:center;'>Selecione um filtro para visualizar os produtos</p>";
  return;
}

  const andarSelecionado = filtroAndar.value;
const colunaSelecionada = filtroColuna.value;


  dados
  .filter(item => 
    item["Produto"] &&
    (!rua || item["Rua"] == rua) &&
    (!andarSelecionado || item["Andar"] == andarSelecionado) &&
    (!colunaSelecionada || item["Coluna"] == colunaSelecionada)
)

    .forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<strong>${item["Produto"]}</strong>`;
      lista.appendChild(li);
    });
}

filtroAndar.addEventListener("change", renderizar);
filtroColuna.addEventListener("change", renderizar);

// força atualização também no toque (mobile)
filtroAndar.addEventListener("input", renderizar);
filtroColuna.addEventListener("input", renderizar);

renderizar();
</script>

</body>
</html>
