  border-radius: 10px;
  border: 1px solid #ccc;
  background: #e6e6e6;
  color: #333;
  cursor: pointer;
  transition: background 0.2s ease, border 0.2s ease;
}

select:hover {
  background: #dcdcdc;
  border-color: #c2c0c0;
}

select:focus,
select:active {
  background: #e6e6e6; /* volta ao normal */
  border-color: #ccc;
  outline: none;
}
  ul {
    padding: 10px;
  }

  li {
  background: transparent;
  padding: 10px 0;
  margin: 0;
  list-style: none;
  font-size: 16px;
  border-bottom: none;
}

  li:hover {
    background: #525252;
  }

  p {
    color: #666;
    font-size: 15px;
  }
</style>

// pega parâmetros da URL
const params = new URLSearchParams(window.location.search);
const rua = params.get("rua");
const andar = params.get("andar");

const tituloRua = document.getElementById("tituloRua");

if (rua) {
  tituloRua.textContent = `RUA ${rua}`;
}

const lista = document.getElementById("lista");
const filtroAndar = document.getElementById("filtroAndar");

function renderizar() {
  lista.innerHTML = "";

  if (!filtroAndar.value && !filtroColuna.value) {
  lista.innerHTML = "<p style='text-align:center;'>Selecione um filtro para visualizar os produtos</p>";
  return;
}

  const andarSelecionado = filtroAndar.value;
const colunaSelecionada = filtroColuna.value;


  dados
    .filter(item => 
  item.A !== "PRODUTO" &&
  (!rua || item.B == rua) &&
  (!andarSelecionado || item.C == andarSelecionado) &&
  (!colunaSelecionada || item.D == colunaSelecionada)
)

    .forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<strong>${item.A}</strong>`;
      lista.appendChild(li);
    });
}

filtroAndar.addEventListener("change", renderizar);
filtroColuna.addEventListener("change", renderizar);

// força atualização também no toque (mobile)
filtroAndar.addEventListener("input", renderizar);
filtroColuna.addEventListener("input", renderizar);

// primeira execução
renderizar();
